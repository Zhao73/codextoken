<svg width="1600" height="880" viewBox="0 0 1600 880" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4C8CFF"/>
      <stop offset="1" stop-color="#245FF0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67D7D3"/>
      <stop offset="1" stop-color="#1799A4"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB56B"/>
      <stop offset="1" stop-color="#F1873F"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="880" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#B3C3E6" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="880" rx="32" fill="#F6F9FF"/>
  <text x="104" y="128" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="58" font-weight="800">Built around the real Codex workflow</text>
  <text x="104" y="178" fill="#64748B" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="28" font-weight="500">The README should tell a story quickly: switch faster, choose smarter, and keep every session organized.</text>

  <g filter="url(#shadow)">
    <rect x="104" y="252" width="432" height="500" rx="32" fill="url(#cardBg)"/>
    <rect x="144" y="290" width="70" height="70" rx="22" fill="#EAF1FF"/>
    <path d="M168 326H190" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 314L192 326L180 338" stroke="#2563EB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="144" y="428" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="38" font-weight="800">Switch with confidence</text>
    <text x="144" y="478" fill="#64748B" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="24" font-weight="500">Validate the target account, roll back on failure, and keep the current CLI session safe.</text>
    <rect x="144" y="560" width="352" height="148" rx="26" fill="#F7FAFF" stroke="#E6ECF7" stroke-width="2"/>
    <text x="178" y="618" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="25" font-weight="800">Saved accounts</text>
    <rect x="178" y="638" width="284" height="18" rx="9" fill="#E6ECF5"/>
    <rect x="178" y="638" width="184" height="18" rx="9" fill="url(#blue)"/>
    <text x="178" y="690" fill="#334155" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="24" font-weight="700">Stable switching and rollback</text>

    <rect x="584" y="252" width="432" height="500" rx="32" fill="url(#cardBg)"/>
    <rect x="624" y="290" width="70" height="70" rx="22" fill="#E6FBFB"/>
    <rect x="642" y="332" width="36" height="10" rx="5" fill="#1599A3"/>
    <rect x="642" y="315" width="20" height="10" rx="5" fill="#1599A3"/>
    <text x="624" y="428" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="38" font-weight="800">Choose by quota, not memory</text>
    <text x="624" y="478" fill="#64748B" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="24" font-weight="500">See 5-hour and weekly windows side by side before you burn the wrong account.</text>
    <rect x="624" y="560" width="352" height="148" rx="26" fill="#F7FAFF" stroke="#E6ECF7" stroke-width="2"/>
    <text x="658" y="618" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="25" font-weight="800">Live quota windows</text>
    <rect x="658" y="638" width="284" height="18" rx="9" fill="#E6ECF5"/>
    <rect x="658" y="638" width="222" height="18" rx="9" fill="url(#teal)"/>
    <text x="658" y="690" fill="#334155" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="24" font-weight="700">5h and weekly windows together</text>

    <rect x="1064" y="252" width="432" height="500" rx="32" fill="url(#cardBg)"/>
    <rect x="1104" y="290" width="70" height="70" rx="22" fill="#FFF2E7"/>
    <rect x="1124" y="314" width="30" height="24" rx="6" stroke="#F1873F" stroke-width="6"/>
    <path d="M1118 348H1160" stroke="#F1873F" stroke-width="6" stroke-linecap="round"/>
    <text x="1104" y="428" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="38" font-weight="800">Keep every shell isolated</text>
    <text x="1104" y="478" fill="#64748B" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="24" font-weight="500">Launch account-specific Terminal sessions with their own CODEX_HOME and copied config.</text>
    <rect x="1104" y="560" width="352" height="148" rx="26" fill="#F7FAFF" stroke="#E6ECF7" stroke-width="2"/>
    <text x="1138" y="618" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="25" font-weight="800">Isolated CLI</text>
    <rect x="1138" y="638" width="284" height="18" rx="9" fill="#E6ECF5"/>
    <rect x="1138" y="638" width="164" height="18" rx="9" fill="url(#orange)"/>
    <text x="1138" y="690" fill="#334155" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="24" font-weight="700">Per-account CODEX_HOME</text>
  </g>
</svg>
